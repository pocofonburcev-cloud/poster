<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Постер 40x60 со звуком</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* Информационный экран загрузки */
      #example-scanning-overlay {
        display: flex; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.7); color: white;
        font-family: sans-serif; font-size: 18px; z-index: 100;
        text-align: center; padding: 20px;
      }
    </style>
  </head>
  <body>
    <div id="example-scanning-overlay">
      <div>Наведите камеру на постер и нажмите на экран для включения звука...</div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: #example-scanning-overlay" 
             color-space="sRGB" renderer="colorManagement: true, sortObjects: true" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" src="./video.mp4" preload="auto" loop="true" crossorigin="anonymous" muted playsinline webkit-playsinline></video>
        <audio id="ar-music" src="./music.mp3" preload="auto" loop="true" crossorigin="anonymous"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="poster-target" mindar-image-target="targetIndex: 0">
        <a-video src="#ar-video" width="1" height="1.5" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#ar-video');
      const music = document.querySelector('#ar-music');
      const targetEntity = document.querySelector('#poster-target');
      let isTargetFound = false;

      // Активация звука и видео по клику пользователя на экран телефона
      window.addEventListener('click', () => {
        if (isTargetFound) {
          if (video.paused) video.play();
          if (music.paused) music.play();
        }
      });

      // Событие: постер попал в поле зрения камеры
      targetEntity.addEventListener("targetFound", event => {
        isTargetFound = true;
        video.play();
        // Запускаем песню (сработает сразу, если пользователь уже кликал по экрану)
        music.play().catch(err => console.log("Ожидание первого клика для активации аудио"));
      });

      // Событие: камеру увели от постера (ставим на паузу, чтобы сберечь батарею и не шуметь)
      targetEntity.addEventListener("targetLost", event => {
        isTargetFound = false;
        video.pause();
        music.pause();
      });
    </script>
  </body>
</html>
