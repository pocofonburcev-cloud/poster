<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Постер 40x60</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* Сделали подсказку аккуратной, без затемнения всего экрана */
      #example-scanning-overlay {
        position: absolute; left: 0; right: 0; top: 20px;
        text-align: center; color: white;
        font-family: sans-serif; font-size: 16px; z-index: 100;
        background: rgba(0, 0, 0, 0.5); /* Легкая плашка только под текстом */
        padding: 10px; width: 80%; margin: 0 auto; border-radius: 8px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="example-scanning-overlay">
      <div>Наведите на постер и нажмите на экран для звука</div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: #example-scanning-overlay" 
             color-space="sRGB" renderer="colorManagement: true, sortObjects: true" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" src="./video_v2.mp4" preload="auto" loop="true" crossorigin="anonymous" muted playsinline webkit-playsinline></video>
        <audio id="ar-music" src="./music.mp3" preload="auto" loop="true" crossorigin="anonymous"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="poster-target" mindar-image-target="targetIndex: 0">
        <a-video src="#ar-video" width="1" height="1.5" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#ar-video');
      const music = document.querySelector('#ar-music');
      const targetEntity = document.querySelector('#poster-target');
      const overlay = document.querySelector('#example-scanning-overlay');
      let isTargetFound = false;

      window.addEventListener('click', () => {
        if (isTargetFound) {
          if (video.paused) video.play();
          if (music.paused) music.play();
        }
      });

      targetEntity.addEventListener("targetFound", event => {
        isTargetFound = true;
        video.play();
        music.play().catch(err => console.log("Ожидание клика"));
        // Полностью скрываем надпись, когда постер найден
        overlay.style.display = "none";
      });

      targetEntity.addEventListener("targetLost", event => {
        isTargetFound = false;
        video.pause();
        music.pause();
        // Снова показываем подсказку, если камеру увели в сторону
        overlay.style.display = "block";
      });
    </script>
  </body>
</html>
