<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Постер 40x60 Бумеранг</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #example-scanning-overlay {
        position: absolute; left: 0; right: 0; top: 20px;
        text-align: center; color: white;
        font-family: sans-serif; font-size: 16px; z-index: 100;
        background: rgba(0, 0, 0, 0.6);
        padding: 12px; width: 85%; margin: 0 auto; border-radius: 8px;
        pointer-events: none;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      }
    </style>
  </head>
  <body>
    <div id="example-scanning-overlay">
      <div>Наведите камеру на постер и нажмите на экран для звука</div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: #example-scanning-overlay" 
             color-space="sRGB" renderer="colorManagement: true, sortObjects: true" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" src="./video_v2.mp4" preload="auto" crossorigin="anonymous" muted playsinline webkit-playsinline></video>
        <audio id="ar-music" src="./music.mp3" preload="auto" loop="true" crossorigin="anonymous"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="poster-target" mindar-image-target="targetIndex: 0"
                filterMinCF="0.0005" 
                filterBeta="0.001" 
                smoothCount="15" 
                smoothTolerance="0.01" 
                smoothThreshold="5">
        
        <a-video src="#ar-video" width="1" height="1.5" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#ar-video');
      const music = document.querySelector('#ar-music');
      const targetEntity = document.querySelector('#poster-target');
      const overlay = document.querySelector('#example-scanning-overlay');
      let isTargetFound = false;
      let direction = 1; 

      window.addEventListener('click', () => {
        if (isTargetFound) {
          if (video.paused && direction === 1) video.play();
          if (music.paused) music.play();
        }
      });

      targetEntity.addEventListener("targetFound", event => {
        isTargetFound = true;
        if (direction === 1) video.play();
        music.play().catch(err => console.log("Ожидание клика"));
        overlay.style.display = "none";
      });

      targetEntity.addEventListener("targetLost", event => {
        isTargetFound = false;
        video.pause();
        music.pause();
        overlay.style.display = "block";
      });

      // Ловим только КОНЕЦ видео (когда оно проигрывается вперед)
      video.addEventListener('timeupdate', () => {
        if (direction === 1 && video.currentTime >= video.duration - 0.1) {
          direction = -1;
          video.pause(); // Ставим на паузу, чтобы перематывать назад в таймере
        }
      });

      // Таймер: отвечает за плавную перемотку назад И запуск нового круга вперед
      setInterval(() => {
        if (isTargetFound && direction === -1) {
          if (video.readyState >= 2) {
            // Мотаем назад мелкими шажками
            video.currentTime = Math.max(0, video.currentTime - 0.04);
            
            // Если дошли до начала (меньше или равно 0.1 сек)
            if (video.currentTime <= 0.1) {
              direction = 1;  // Меняем направление на "вперед"
              video.play();   // Запускаем воспроизведение заново!
            }
          }
        }
      }, 40);
    </script>
  </body>
</html>
